services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: trading_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/trading_bot
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: dev
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  celery:
    build:
      context: ./backend
    command: celery -A app.tasks.worker worker --loglevel=INFO
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/trading_bot
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  flower:
    image: mher/flower:2.0
    command: celery flower --port=5555
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis

volumes:
  db_data:
