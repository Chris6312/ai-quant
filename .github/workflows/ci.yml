name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
            - name: Mypy
        run: python -m mypy app --install-types --non-interactive --disable-error-code=untyped-decorator --disable-error-code=unused-ignore
      - name: Pytest
        run: pytest
